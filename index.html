<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RAISE | A Michael P. Nash Film Series</title>
  <meta
    name="description"
    content="RAISE, a Michael P. Nash film series."
  />

  <style>
    :root {
      --ink: #061018;
      --muted: #5b6670;
      --line: rgba(6, 16, 24, 0.14);
      --paper: #eef3f4;
      --paper-2: #f7fafb;
      --blue: #5f8ea2;
      --white: #ffffff;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .nav {
      position: fixed;
      top: 22px;
      right: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 999px;
      background: rgba(6, 16, 24, 0.18);
      backdrop-filter: blur(12px);
      color: #ffffff;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.38);
    }

    .nav a {
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.92;
      transition: opacity 160ms ease;
      white-space: nowrap;
    }

    .nav a:hover {
      opacity: 1;
    }

    .art {
      width: 100%;
      background: var(--paper);
    }

    .art img {
      width: 100%;
      height: auto;
    }

    .separator {
      height: 1px;
      width: 100%;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.42);
    }

    .section {
      padding: 74px 28px 82px;
      background: linear-gradient(180deg, var(--paper-2), var(--paper));
    }

    .section-inner {
      max-width: var(--max);
      margin: 0 auto;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--blue);
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1,
    h2 {
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.055em;
      color: var(--ink);
    }

    h1 {
      font-size: clamp(38px, 5.2vw, 72px);
      line-height: 0.96;
    }

    h2 {
      font-size: clamp(34px, 4.2vw, 58px);
      line-height: 0.98;
    }

    .event-grid {
      display: grid;
      grid-template-columns: 0.72fr 1.28fr;
      gap: 58px;
      align-items: start;
    }

    .event-details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .event-item {
      min-height: 118px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.72);
    }

    .event-item span {
      display: block;
      margin-bottom: 18px;
      color: var(--blue);
      font-size: 10px;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .event-item strong {
      display: block;
      font-size: clamp(18px, 1.8vw, 25px);
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .button {
      min-height: 48px;
      padding: 0 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #ffffff;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 800;
      transition: transform 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: #000000;
    }

    .button.light {
      background: transparent;
      color: var(--ink);
      border-color: rgba(6, 16, 24, 0.28);
    }

    .button.light:hover {
      background: rgba(255, 255, 255, 0.55);
    }

    .trailer-grid,
    .contact-grid {
      display: grid;
      grid-template-columns: 0.72fr 1.28fr;
      gap: 58px;
      align-items: start;
    }

    .trailer-copy {
      max-width: 520px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: -0.02em;
    }

    .trailer-copy p {
      margin: 0;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #061018;
      border: 1px solid rgba(6, 16, 24, 0.16);
      box-shadow: 0 22px 68px rgba(6, 16, 24, 0.10);
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .contact-card {
      width: 100%;
      max-width: 620px;
      justify-self: end;
      padding: 28px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(6, 16, 24, 0.14);
      box-shadow: 0 22px 68px rgba(6, 16, 24, 0.08);
    }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 10px;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      margin: 0 0 16px;
      padding: 14px;
      border: 1px solid rgba(6, 16, 24, 0.18);
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(6, 16, 24, 0.48);
      background: #ffffff;
    }

    .send {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #ffffff;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .send:hover {
      transform: translateY(-1px);
      background: #000000;
    }

    footer {
      padding: 24px 28px 30px;
      background: var(--paper);
      color: rgba(6, 16, 24, 0.52);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: center;
    }

    @media (max-width: 980px) {
      .event-grid,
      .trailer-grid,
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .event-details {
        grid-template-columns: repeat(2, 1fr);
      }

      .contact-card {
        max-width: none;
        justify-self: stretch;
      }
    }

    @media (max-width: 720px) {
      .nav {
        top: 14px;
        right: 14px;
        left: 14px;
        justify-content: center;
        gap: 16px;
        padding: 11px 12px;
      }

      .nav a {
        font-size: 10px;
      }

      .section {
        padding: 58px 22px 66px;
      }

      .event-details {
        grid-template-columns: 1fr;
      }

      .event-item {
        min-height: auto;
      }

      .button {
        width: 100%;
      }

      .contact-card {
        padding: 22px;
      }
    }
  </style>
</head>

<body>
  <nav class="nav" aria-label="Page navigation">
    <a href="#screening">Screening</a>
    <a href="#trailer">Trailer</a>
    <a href="#contact">Contact</a>
  </nav>

  <main>
    <section class="art" aria-label="RAISE">
      <img src="assets/raise-poster-horizontal.jpeg?v=31" alt="RAISE film artwork" />
    </section>

    <div class="separator" aria-hidden="true"></div>

    <section class="section" id="screening" aria-label="Screening">
      <div class="section-inner event-grid">
        <div>
          <p class="eyebrow">Screening</p>
          <h1>AI for Good Global Summit.</h1>
        </div>

        <div>
          <div class="event-details">
            <div class="event-item">
              <span>Date</span>
              <strong>9 July 2026</strong>
            </div>

            <div class="event-item">
              <span>Time</span>
              <strong>18:30–20:00 CEST</strong>
            </div>

            <div class="event-item">
              <span>Venue</span>
              <strong>Centre Stage</strong>
            </div>

            <div class="event-item">
              <span>Location</span>
              <strong>Geneva</strong>
            </div>
          </div>

          <div class="button-row">
            <a
              class="button"
              href="https://aiforgood.itu.int/event/raise-film-screening/"
              target="_blank"
              rel="noopener"
            >
              Official Event
            </a>
          </div>
        </div>
      </div>
    </section>

    <div class="separator" aria-hidden="true"></div>

    <section class="section" id="trailer" aria-label="Trailer">
      <div class="section-inner trailer-grid">
        <div>
          <p class="eyebrow">Trailer</p>
          <h2>Watch the trailer.</h2>
        </div>

        <div class="video-frame">
          <iframe
            src="https://player.vimeo.com/video/1167036537?h=fa9181d495&title=0&byline=0&portrait=0"
            title="RAISE trailer"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    </section>

    <div class="separator" aria-hidden="true"></div>

    <section class="art" aria-label="RAISE artwork">
      <img src="assets/raise-robot-earth.jpeg?v=31" alt="RAISE artwork with robot and Earth" />
    </section>

    <div class="separator" aria-hidden="true"></div>

    <section class="section" id="contact" aria-label="Contact">
      <div class="section-inner contact-grid">
        <div>
          <p class="eyebrow">Contact</p>
          <h2>Production inquiries.</h2>
        </div>

        <form class="contact-card" id="contactForm">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name" />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="Your email" />

          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Your message"></textarea>

          <button class="send" type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    © RAISE Film
  </footer>

  <script>
    const form = document.getElementById("contactForm");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      const recipient = ["Nash", "BeverlyHillsProductions.com"].join("@");
      const subject = encodeURIComponent("RAISE website inquiry");
      const body = encodeURIComponent(
        `Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`
      );

      window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;
    });
  </script>
</body>
</html>
